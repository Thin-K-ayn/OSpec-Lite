<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">OSpec Lite 初始化流程</title>
  <desc id="desc">面向用户的流程图，展示如何通过编码 agent 初始化仓库，并可选择 profile。</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569" />
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10" />
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; font-size: 32px; font-weight: 700; }
      .subtitle { fill: #475569; font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; font-size: 17px; font-weight: 400; }
      .prompt { fill: #ecfdf5; stroke: #047857; stroke-width: 2.5; filter: url(#shadow); }
      .agent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; filter: url(#shadow); }
      .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; filter: url(#shadow); }
      .result { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2.5; filter: url(#shadow); }
      .label { fill: #0f172a; font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; font-size: 17px; font-weight: 700; }
      .body { fill: #334155; font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; font-size: 14.5px; font-weight: 400; }
      .edge { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .edge-soft { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .tag { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .tagText { fill: #475569; font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif; font-size: 13px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="820" rx="28" />
  <text class="title" x="56" y="58">用 OSpec Lite 初始化仓库</text>
  <text class="subtitle" x="56" y="90">用自然语言指挥编码 agent；agent 负责 setup、profile 细节、验证和交接。</text>

  <rect class="prompt" x="56" y="150" width="230" height="96" rx="18" />
  <text class="label" x="84" y="187">说出目标</text>
  <text class="body" x="84" y="215">“用 OSpec Lite</text>
  <text class="body" x="84" y="237">初始化这个仓库。”</text>

  <rect class="prompt" x="332" y="150" width="230" height="96" rx="18" />
  <text class="label" x="360" y="187">可选 profile</text>
  <text class="body" x="360" y="215">如果仓库需要，</text>
  <text class="body" x="360" y="237">说明要使用的 profile。</text>

  <rect class="agent" x="608" y="150" width="230" height="96" rx="18" />
  <text class="label" x="636" y="187">Agent 扫描仓库</text>
  <text class="body" x="636" y="215">读取结构、标记</text>
  <text class="body" x="636" y="237">和已有文档。</text>

  <polygon class="decision" points="1032,128 1162,198 1032,268 902,198" />
  <text class="label" x="992" y="193">已经</text>
  <text class="label" x="984" y="216">初始化？</text>

  <rect class="agent" x="914" y="330" width="236" height="96" rx="18" />
  <text class="label" x="942" y="367">汇报现有 setup</text>
  <text class="body" x="942" y="395">总结当前</text>
  <text class="body" x="942" y="417">OSpec Lite 状态。</text>

  <polygon class="decision" points="724,318 854,388 724,458 594,388" />
  <text class="label" x="687" y="383">使用</text>
  <text class="label" x="684" y="406">profile？</text>

  <rect class="agent" x="300" y="520" width="250" height="104" rx="18" />
  <text class="label" x="328" y="557">确认细节</text>
  <text class="body" x="328" y="585">使用 profile，</text>
  <text class="body" x="328" y="607">只询问缺失信息。</text>

  <rect class="agent" x="680" y="520" width="250" height="104" rx="18" />
  <text class="label" x="708" y="557">通用 setup</text>
  <text class="body" x="708" y="585">不使用专门</text>
  <text class="body" x="708" y="607">profile。</text>

  <rect class="agent" x="470" y="678" width="300" height="94" rx="18" />
  <text class="label" x="502" y="715">生成指引</text>
  <text class="body" x="502" y="743">生成 agent 文件和</text>
  <text class="body" x="502" y="765">.oslite 知识层。</text>

  <rect class="result" x="892" y="678" width="300" height="94" rx="18" />
  <text class="label" x="924" y="715">验证并复核</text>
  <text class="body" x="924" y="743">检查生成文件，</text>
  <text class="body" x="924" y="765">确认下一步。</text>

  <path class="edge" d="M286 198 L332 198" />
  <path class="edge-soft" d="M562 198 L608 198" />
  <path class="edge" d="M838 198 L902 198" />
  <path class="edge" d="M1032 268 L1032 330" />
  <path class="edge" d="M902 198 C812 198 724 250 724 318" />
  <path class="edge" d="M594 388 C510 388 425 444 425 520" />
  <path class="edge" d="M724 458 C724 488 758 500 805 520" />
  <path class="edge" d="M425 624 C425 668 520 678 620 678" />
  <path class="edge" d="M805 624 C805 668 720 678 620 678" />
  <path class="edge" d="M770 725 L892 725" />
  <path class="edge" d="M1032 426 C1032 560 1042 612 1042 678" />

  <rect class="tag" x="1044" y="286" width="46" height="24" rx="12" />
  <text class="tagText" x="1060" y="303">是</text>
  <rect class="tag" x="842" y="226" width="40" height="24" rx="12" />
  <text class="tagText" x="856" y="243">否</text>
  <rect class="tag" x="508" y="444" width="46" height="24" rx="12" />
  <text class="tagText" x="524" y="461">是</text>
  <rect class="tag" x="766" y="474" width="40" height="24" rx="12" />
  <text class="tagText" x="780" y="491">否</text>
</svg>
