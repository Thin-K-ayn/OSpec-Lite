<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">OSpec Lite initialization flow</title>
  <desc id="desc">A user-facing flowchart showing how to initialize a repository with OSpec Lite through a coding agent, including optional profile selection.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569" />
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10" />
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; }
      .subtitle { fill: #475569; font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 400; }
      .prompt { fill: #ecfdf5; stroke: #047857; stroke-width: 2.5; filter: url(#shadow); }
      .agent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; filter: url(#shadow); }
      .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; filter: url(#shadow); }
      .result { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2.5; filter: url(#shadow); }
      .label { fill: #0f172a; font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; }
      .body { fill: #334155; font-family: Arial, Helvetica, sans-serif; font-size: 14.5px; font-weight: 400; }
      .edge { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .edge-soft { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .tag { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .tagText { fill: #475569; font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="820" rx="28" />
  <text class="title" x="56" y="58">Initialize a Repo with OSpec Lite</text>
  <text class="subtitle" x="56" y="90">Guide the coding agent in plain language. The agent handles setup, profile details, verification, and handoff.</text>

  <rect class="prompt" x="56" y="150" width="230" height="96" rx="18" />
  <text class="label" x="84" y="187">Say what you want</text>
  <text class="body" x="84" y="215">“Initialize this repo</text>
  <text class="body" x="84" y="237">with OSpec Lite.”</text>

  <rect class="prompt" x="332" y="150" width="230" height="96" rx="18" />
  <text class="label" x="360" y="187">Optional profile</text>
  <text class="body" x="360" y="215">Mention a profile if</text>
  <text class="body" x="360" y="237">the repo needs one.</text>

  <rect class="agent" x="608" y="150" width="230" height="96" rx="18" />
  <text class="label" x="636" y="187">Agent scans repo</text>
  <text class="body" x="636" y="215">Reads structure, markers,</text>
  <text class="body" x="636" y="237">and existing docs.</text>

  <polygon class="decision" points="1032,128 1162,198 1032,268 902,198" />
  <text class="label" x="988" y="193">Already</text>
  <text class="label" x="976" y="216">initialized?</text>

  <rect class="agent" x="914" y="330" width="236" height="96" rx="18" />
  <text class="label" x="942" y="367">Report setup</text>
  <text class="body" x="942" y="395">Summarize the current</text>
  <text class="body" x="942" y="417">OSpec Lite state.</text>

  <polygon class="decision" points="724,318 854,388 724,458 594,388" />
  <text class="label" x="682" y="383">Use a</text>
  <text class="label" x="675" y="406">profile?</text>

  <rect class="agent" x="300" y="520" width="250" height="104" rx="18" />
  <text class="label" x="328" y="557">Confirm details</text>
  <text class="body" x="328" y="585">Use the profile and ask</text>
  <text class="body" x="328" y="607">only for missing inputs.</text>

  <rect class="agent" x="680" y="520" width="250" height="104" rx="18" />
  <text class="label" x="708" y="557">Use generic setup</text>
  <text class="body" x="708" y="585">Continue without a</text>
  <text class="body" x="708" y="607">specialized profile.</text>

  <rect class="agent" x="470" y="678" width="300" height="94" rx="18" />
  <text class="label" x="502" y="715">Create guidance</text>
  <text class="body" x="502" y="743">Generate agent files and the</text>
  <text class="body" x="502" y="765">.oslite knowledge layer.</text>

  <rect class="result" x="892" y="678" width="300" height="94" rx="18" />
  <text class="label" x="924" y="715">Verify and review</text>
  <text class="body" x="924" y="743">Check generated files and</text>
  <text class="body" x="924" y="765">review next steps.</text>

  <path class="edge" d="M286 198 L332 198" />
  <path class="edge-soft" d="M562 198 L608 198" />
  <path class="edge" d="M838 198 L902 198" />
  <path class="edge" d="M1032 268 L1032 330" />
  <path class="edge" d="M902 198 C812 198 724 250 724 318" />
  <path class="edge" d="M594 388 C510 388 425 444 425 520" />
  <path class="edge" d="M724 458 C724 488 758 500 805 520" />
  <path class="edge" d="M425 624 C425 668 520 678 620 678" />
  <path class="edge" d="M805 624 C805 668 720 678 620 678" />
  <path class="edge" d="M770 725 L892 725" />
  <path class="edge" d="M1032 426 C1032 560 1042 612 1042 678" />

  <rect class="tag" x="1044" y="286" width="46" height="24" rx="12" />
  <text class="tagText" x="1058" y="303">Yes</text>
  <rect class="tag" x="842" y="226" width="40" height="24" rx="12" />
  <text class="tagText" x="855" y="243">No</text>
  <rect class="tag" x="508" y="444" width="46" height="24" rx="12" />
  <text class="tagText" x="522" y="461">Yes</text>
  <rect class="tag" x="766" y="474" width="40" height="24" rx="12" />
  <text class="tagText" x="779" y="491">No</text>
</svg>
