<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="980" viewBox="0 0 1280 980" role="img" aria-labelledby="title desc">
  <title id="title">OSpec Lite bug flow</title>
  <desc id="desc">A user-facing flowchart showing how a coding agent uses the OSpec Lite bug workflow to record a defect, fix it, verify it, and preserve the lesson in bug memory.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569" />
    </marker>
    <filter id="shadow" x="-8%" y="-12%" width="116%" height="124%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.10" />
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { fill: #0f172a; font-family: Arial, Helvetica, sans-serif; font-size: 32px; font-weight: 700; }
      .subtitle { fill: #475569; font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 400; }
      .prompt { fill: #ecfdf5; stroke: #047857; stroke-width: 2.5; filter: url(#shadow); }
      .agent { fill: #eff6ff; stroke: #2563eb; stroke-width: 2.5; filter: url(#shadow); }
      .decision { fill: #fff7ed; stroke: #ea580c; stroke-width: 2.5; filter: url(#shadow); }
      .bug { fill: #fef2f2; stroke: #dc2626; stroke-width: 2.5; filter: url(#shadow); }
      .memory { fill: #f5f3ff; stroke: #7c3aed; stroke-width: 2.5; filter: url(#shadow); }
      .result { fill: #f0fdfa; stroke: #0f766e; stroke-width: 2.5; filter: url(#shadow); }
      .label { fill: #0f172a; font-family: Arial, Helvetica, sans-serif; font-size: 17px; font-weight: 700; }
      .body { fill: #334155; font-family: Arial, Helvetica, sans-serif; font-size: 14.5px; font-weight: 400; }
      .edge { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .loop { stroke: #64748b; stroke-width: 2.5; fill: none; marker-end: url(#arrow); stroke-dasharray: 7 6; }
      .tag { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1; }
      .tagText { fill: #475569; font-family: Arial, Helvetica, sans-serif; font-size: 13px; font-weight: 700; }
    </style>
  </defs>

  <rect class="bg" width="1280" height="980" rx="28" />
  <text class="title" x="56" y="58">Use an OSpec Lite Bug</text>
  <text class="subtitle" x="56" y="90">Report what is broken. The agent records the defect, fixes it, verifies it, and preserves the lesson in bug memory.</text>

  <rect class="prompt" x="56" y="150" width="230" height="96" rx="18" />
  <text class="label" x="84" y="187">Say what is broken</text>
  <text class="body" x="84" y="215">Describe the symptom</text>
  <text class="body" x="84" y="237">in plain language.</text>

  <rect class="agent" x="330" y="150" width="230" height="96" rx="18" />
  <text class="label" x="358" y="187">Agent checks state</text>
  <text class="body" x="358" y="215">Reads OSpec Lite status</text>
  <text class="body" x="358" y="237">and repo context.</text>

  <polygon class="decision" points="720,128 850,198 720,268 590,198" />
  <text class="label" x="682" y="193">Is it a</text>
  <text class="label" x="684" y="216">defect?</text>

  <rect class="agent" x="960" y="150" width="230" height="96" rx="18" />
  <text class="label" x="988" y="187">Use another path</text>
  <text class="body" x="988" y="215">Handle as a normal</text>
  <text class="body" x="988" y="237">task or question.</text>

  <rect class="bug" x="56" y="356" width="238" height="100" rx="18" />
  <text class="label" x="84" y="393">Create bug item</text>
  <text class="body" x="84" y="421">Open a focused active</text>
  <text class="body" x="84" y="443">bug section.</text>

  <rect class="bug" x="346" y="356" width="238" height="100" rx="18" />
  <text class="label" x="374" y="393">Record evidence</text>
  <text class="body" x="374" y="421">Capture symptom, repro,</text>
  <text class="body" x="374" y="443">and investigation.</text>

  <rect class="bug" x="636" y="356" width="238" height="100" rx="18" />
  <text class="label" x="664" y="393">Find root cause</text>
  <text class="body" x="664" y="421">Write the mistaken</text>
  <text class="body" x="664" y="443">assumption clearly.</text>

  <rect class="agent" x="926" y="356" width="270" height="100" rx="18" />
  <text class="label" x="954" y="393">Implement fix</text>
  <text class="body" x="954" y="421">Change code or docs at</text>
  <text class="body" x="954" y="443">the real source.</text>

  <rect class="agent" x="56" y="600" width="238" height="100" rx="18" />
  <text class="label" x="84" y="637">Record fix notes</text>
  <text class="body" x="84" y="665">List files, summary,</text>
  <text class="body" x="84" y="687">and reason.</text>

  <rect class="agent" x="346" y="600" width="238" height="100" rx="18" />
  <text class="label" x="374" y="637">Verify with evidence</text>
  <text class="body" x="374" y="665">Run checks and save</text>
  <text class="body" x="374" y="687">real results.</text>

  <polygon class="decision" points="755,580 875,650 755,720 635,650" />
  <text class="label" x="719" y="645">Verified?</text>

  <rect class="memory" x="960" y="600" width="230" height="100" rx="18" />
  <text class="label" x="988" y="637">Apply lesson</text>
  <text class="body" x="988" y="665">Persist the check-first</text>
  <text class="body" x="988" y="687">lesson in bug memory.</text>

  <rect class="agent" x="594" y="798" width="270" height="90" rx="18" />
  <text class="label" x="626" y="833">Clear active queue</text>
  <text class="body" x="626" y="861">Remove the fixed bug from active work.</text>

  <rect class="result" x="910" y="798" width="300" height="90" rx="18" />
  <text class="label" x="942" y="833">Review the handoff</text>
  <text class="body" x="942" y="861">Cause, fix, checks, lesson, and risks.</text>

  <path class="edge" d="M286 198 L330 198" />
  <path class="edge" d="M560 198 L590 198" />
  <path class="edge" d="M850 198 L960 198" />
  <path class="edge" d="M720 268 C720 318 175 310 175 356" />
  <path class="edge" d="M294 406 L346 406" />
  <path class="edge" d="M584 406 L636 406" />
  <path class="edge" d="M874 406 L926 406" />
  <path class="edge" d="M1061 456 C1061 540 175 520 175 600" />
  <path class="edge" d="M294 650 L346 650" />
  <path class="edge" d="M584 650 L635 650" />
  <path class="loop" d="M755 580 C755 535 1000 525 1061 456" />
  <path class="edge" d="M875 650 L960 650" />
  <path class="edge" d="M1075 700 C1075 774 864 760 729 798" />
  <path class="edge" d="M864 843 L910 843" />
  <path class="edge" d="M1190 198 L1232 198 L1232 843 L1210 843" />

  <rect class="tag" x="858" y="168" width="40" height="24" rx="12" />
  <text class="tagText" x="871" y="185">No</text>
  <rect class="tag" x="386" y="304" width="46" height="24" rx="12" />
  <text class="tagText" x="400" y="321">Yes</text>
  <rect class="tag" x="884" y="548" width="40" height="24" rx="12" />
  <text class="tagText" x="897" y="565">No</text>
  <rect class="tag" x="902" y="620" width="46" height="24" rx="12" />
  <text class="tagText" x="916" y="637">Yes</text>
</svg>
